titles:
  include: ["Engineer", "Developer", "Software", "Data", "DevOps", "ML", "Integration", "Backend", "Frontend", "Fullstack", "Python", "AI", "Senior", "Architect", "Solutions", "Technical", "Lead", "Manager", "Analyst", "Platform", "Cloud", "Infrastructure", "SRE"]
  exclude: ["Intern", "Junior"]

keywords:
  include:
    - python
    - aws
    - lambda
    - ai
    - ml
    - integration
    - backend
    - senior
    - architect
    - solutions
    - technical
    - developer
    - engineer
    - data
    - devops
    - cloud
    - infrastructure
    - platform
    - kubernetes
    - docker
    - terraform

  exclude:
    - php
    - cobol

locations:
  include:
    - Remote
    - Anywhere
    - Worldwide
    - USA
    - United States
    - Americas
    - North America
    - Canada
  exclude:
    - Onsite Only

salary:
  min: 160000            # adjust to your preference
  allow_missing: true    # most listings don't include salary
