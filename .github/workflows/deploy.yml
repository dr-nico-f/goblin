name: Deploy Lambda

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  FUNCTION_NAME: goblin-bot
  PY_VERSION: "3.12"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Restore profiles.yaml (if provided)
        run: |
          if [ -n "${{ secrets.PROFILES_YAML_B64 }}" ]; then
            mkdir -p configs
            echo "${{ secrets.PROFILES_YAML_B64 }}" | base64 -d > configs/profiles.yaml
            echo "profiles.yaml restored from secret."
          else
            echo "No PROFILES_YAML_B64 secret set; skipping profiles restore."
          fi

      - name: Build Lambda package
        run: |
          set -e
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          rm -rf build && mkdir -p build
          # vendor deps into build/
          pip install -r requirements.txt -t build
          # copy app code + configs
          rsync -a src/ build/
          rsync -a configs/ build/configs/ || true
          mkdir -p build/data
          cd build && zip -r ../package.zip .

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create/Update Lambda (with waits)
        shell: bash
        run: |
          set -euo pipefail
          FN="${{ env.FUNCTION_NAME }}"
          RUNTIME="python${{ env.PY_VERSION }}"
          HANDLER="goblin/handler.lambda_handler"

          echo "Verifying package.zip exists..."
          ls -lh package.zip

          echo "Checking if function exists..."
          if aws lambda get-function --function-name "$FN" >/dev/null 2>&1; then
            echo "Updating code for $FN"
            aws lambda update-function-code \
              --function-name "$FN" \
              --zip-file fileb://package.zip
          else
            echo "Creating $FN"
            aws lambda create-function \
              --function-name "$FN" \
              --runtime "$RUNTIME" \
              --role "${{ secrets.AWS_LAMBDA_ROLE_ARN }}" \
              --handler "$HANDLER" \
              --timeout 30 \
              --memory-size 512 \
              --zip-file fileb://package.zip
          fi

          echo "Waiting for function to become stable..."
          aws lambda wait function-updated --function-name "$FN"

          echo "Updating environment variables..."
          aws lambda update-function-configuration \
            --function-name "$FN" \
            --environment "Variables={GOBLIN_SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}}"

          echo "Waiting again for function to become stable..."
          aws lambda wait function-updated --function-name "$FN"

          echo "Publishing version..."
          aws lambda publish-version --function-name "$FN" >/dev/null

      - name: Show deployed function summary
        run: |
          aws lambda get-function \
            --function-name "${{ env.FUNCTION_NAME }}" \
            --query '{FunctionName:Configuration.FunctionName,Runtime:Configuration.Runtime,LastModified:Configuration.LastModified,Role:Configuration.Role}' \
            --output json